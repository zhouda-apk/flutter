name: ocr_notes_app
description: OCR 掃描筆記應用程式
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 本地資料庫
  sqflite: ^2.3.0
  path: ^1.9.0

  # OCR 辨識（支援繁體中文）
  google_mlkit_text_recognition: ^0.13.0

  # 相機 / 相簿
  image_picker: ^1.1.0
  camera: ^0.10.5

  # 路徑工具
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
